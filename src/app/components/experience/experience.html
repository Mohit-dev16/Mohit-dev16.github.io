<section class="section experience" id="experience">
  <div class="container">
    <div class="section-header">
      <h2 class="section-title">Experience</h2>
      <p class="section-subtitle">My professional journey and key accomplishments</p>
    </div>

    <div class="timeline">
      @for (exp of experiences; track exp.period; let i = $index) {
        <div class="timeline-item" [class.trainee]="exp.type === 'trainee'">
          <div class="timeline-dot">
            <div class="dot-inner"></div>
            <div class="dot-pulse"></div>
          </div>
          <div class="timeline-content glass-card">
            <div class="timeline-header">
              <div>
                <h3 class="timeline-role">{{ exp.role }}</h3>
                <p class="timeline-company">{{ exp.company }}</p>
                <p class="timeline-location">📍 {{ exp.location }}</p>
              </div>
              <span class="timeline-period">{{ exp.period }}</span>
            </div>
            <ul class="timeline-achievements">
              @for (achievement of exp.achievements; track achievement) {
                <li>
                  <span class="achievement-icon">▹</span>
                  {{ achievement }}
                </li>
              }
            </ul>
          </div>
        </div>
      }
    </div>
  </div>
</section>
