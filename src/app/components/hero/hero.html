<section class="hero" id="hero">
  <canvas id="particles-canvas" class="particles-canvas"></canvas>
  <div class="hero-bg-gradient"></div>

  <div class="hero-content container">
    <div class="hero-badge">
      <span class="badge-dot"></span>
      Available for opportunities
    </div>

    <h1 class="hero-title">
      Hi, I'm <span class="gradient-text">Mohit Kumar</span>
    </h1>

    <div class="hero-typing">
      <span class="typing-prefix">&gt; </span>
      <span class="typed-text">{{ typedText() }}</span>
      <span class="cursor">|</span>
    </div>

    <p class="hero-description">
      Building secure, scalable web applications & AI-powered solutions
      with <strong>3+ years</strong> of hands-on experience.
    </p>

    <div class="hero-actions">
      <a class="btn btn-primary" (click)="scrollTo('#contact')" id="hero-contact-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4z"/><path d="M22 2 11 13"/></svg>
        Get In Touch
      </a>
      <a class="btn btn-outline" (click)="scrollTo('#projects')" id="hero-projects-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        View Projects
      </a>
    </div>

    <div class="hero-stats">
      <div class="stat">
        <span class="stat-number">3+</span>
        <span class="stat-label">Years Exp.</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-number">5+</span>
        <span class="stat-label">Projects</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-number">30+</span>
        <span class="stat-label">Technologies</span>
      </div>
    </div>
  </div>

  <div class="scroll-indicator" (click)="scrollTo('#about')">
    <div class="mouse">
      <div class="wheel"></div>
    </div>
    <span>Scroll Down</span>
  </div>
</section>
