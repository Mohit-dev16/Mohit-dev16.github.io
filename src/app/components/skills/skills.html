<section class="section skills" id="skills">
  <div class="container">
    <div class="section-header">
      <h2 class="section-title">Technical Skills</h2>
      <p class="section-subtitle">Technologies and tools I work with to build robust solutions</p>
    </div>

    <div class="skills-grid">
      @for (category of skillCategories; track category.title) {
        <div class="skill-category glass-card">
          <div class="category-header">
            <span class="category-icon">{{ category.icon }}</span>
            <h3 class="category-title">{{ category.title }}</h3>
          </div>
          <div class="skills-list">
            @for (skill of category.skills; track skill) {
              <span class="skill-tag tag">{{ skill }}</span>
            }
          </div>
        </div>
      }
    </div>
  </div>
</section>
